name: zabbix-config

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: zabbix-config-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r zabbix-config/requirements.txt

      - name: Validate configuration
        run: PYTHON=python scripts/ci-validate.sh

  deploy:
    needs: validate
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: zabbix-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r zabbix-config/requirements.txt

      - name: Apply Zabbix configuration
        env:
          ZABBIX_URL: ${{ secrets.ZABBIX_URL }}
          ZABBIX_API_TOKEN: ${{ secrets.ZABBIX_API_TOKEN }}
          ZABBIX_VERIFY_TLS: ${{ vars.ZABBIX_VERIFY_TLS || 'true' }}
        run: PYTHON=python scripts/ci-deploy-zabbix-config.sh
